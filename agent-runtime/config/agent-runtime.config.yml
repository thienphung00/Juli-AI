version: 1
prompt:
  system_prompt: default
  verbosity: medium
  variants:
    default: Meta Agent routes context, assigns one executor domain, and optimizes only declarative harness configuration from runtime artifacts.
  additional_instructions:
    - Preserve product code, ADRs, PRDs, and architecture documents during harness optimization.
    - Prefer measurable changes to context budget, routing, skill loading, model choice, tools, and benchmark thresholds.
model:
  primary: claude-sonnet
  fallback: claude-haiku
  allowed:
    - claude-sonnet
    - claude-haiku
    - gpt-5
    - gpt-5-mini
context:
  budget_tokens: 50000
  max_files: 25
  retrieval_depth: 3
  reserved_reasoning_ratio: 0.1
grill_cache:
  enabled: true
  parent_cache_path: agent-runtime/artifacts/grill-cache/parent-cache-issue-{parentIssueId}.json
  child_cache_path: agent-runtime/artifacts/grill-cache/grill-cache-issue-{n}.json
  scope_alignment_path: docs/handoffs/scope-alignment-issue-{n}.md
  parent_template_json: agent-runtime/templates/parent-cache-template.json
  child_template_json: agent-runtime/templates/grill-cache-issue-template.json
  template_markdown: agent-runtime/templates/scope-alignment-issue-template.md
  parent_schema: agent-runtime/docs/schemas/parent-cache-artifact.schema.json
  child_schema: agent-runtime/docs/schemas/grill-cache-artifact.schema.json
  parent_resolution:
    - epic_handoff_prd_link
    - child_issue_body_parent_field
    - checkpoint_parent_prd
    - gh_issue_labels
  workflow_phases:
    - scope_alignment
    - meta
    - executor
    - review
    - validate
    - complete
  injection_order:
    - parent.parentScopeBlock
    - parent.doNotLoad
    - child.promptCacheBlock
    - child.phaseCacheBlocks.{phase}
    - child.issueLoadProfile
    - child.harnessUtility
  inherit_from_siblings: false
  parent_invalidation_sources:
    - EXECUTION.md
    - GitHub issue #{parentIssueId}
    - docs/handoffs/{epic-handoff}.md
  child_invalidation_sources:
    - GitHub issue #{n}
    - docs/handoffs/scope-alignment-issue-{n}.md
  fingerprint_method: git-blob-sha
  cache_hit_confirm_question: "Parent #{parentIssueId} + child #{n} cached workflow v{cacheBlockVersion} still accurate?"
  harness_utility_cache:
    scope: per_child_issue_only
    skills: minimal_path_and_purpose_only
    mcps: server_and_tool_names_only
    rules: tier2_paths_only
    tools: allowed_tool_names_only
routing:
  backend_threshold: 0.7
  ui_threshold: 0.6
  data_threshold: 0.7
  ml_threshold: 0.7
  domain_mappings:
    backend:
      - backend/src/juli_backend/api
      - backend/src/juli_backend/core
      - backend/src/juli_backend/services
      - backend/src/juli_backend/workers
    ui-ux:
      - apps/dashboard
      - ios
    data-platform:
      - backend/src/juli_backend/database
      - backend/src/juli_backend/database/migrations
    machine-learning:
      - backend/src/juli_backend/ai
  cross_layer_hints:
    backend:
      related_paths:
        - backend/src/juli_backend/api
        - backend/src/juli_backend/database
        - docs/architecture/map.md
      note: API and persistence context often required beyond backend/src/juli_backend/api
    ui-ux:
      related_paths:
        - apps/dashboard
        - ios
        - backend/src/juli_backend/api
        - docs/architecture/map.md
      note: UI tasks frequently depend on API contracts one layer beyond apps/dashboard/
    data-platform:
      related_paths:
        - backend/src/juli_backend/database
        - backend/src/juli_backend/services/etl
        - backend/src/juli_backend/database/migrations
        - docs/architecture/data-sources.md
      note: Schema and ingestion paths span ordering and database layers
    machine-learning:
      related_paths:
        - backend/src/juli_backend/ai
        - backend/src/juli_backend/database
        - docs/api/data-models
      note: Feature pipelines depend on canonical data models outside ai/
  hints:
    - domain: machine-learning
      signal: synthetic_dataset_small
      action: require_golden_fixture_min_100
    - domain: ui-ux
      signal: external_api_call
      action: load_reliability_and_observability_rules
executors:
  enabled:
    - backend
    - ui-ux
    - data-platform
    - machine-learning
  default: backend
skills:
  backend:
    - backend
    - python-patterns
    - patterns
  ui-ux:
    - ui-ux
    - ui-ux-design
    - nextjs
  data-platform:
    - data-platform
    - postgres-patterns
  machine-learning:
    - machine-learning
tools:
  enabled:
    - ReadFile
    - rg
    - Glob
    - ApplyPatch
    - Shell
  disabled: []
  max_invocations_per_run: 80
agents:
  architect:
    phase: planning
    sequence: "[focus, to-prd, to-issues]"
    owns: "[prds, adrs, issues, architecture-docs, backlog]"
    must_not: "[implement, route-executors, validate, ship]"
  meta:
    phase: "[scope-alignment, implementation-routing, harness-optimization]"
    built_on: focus
    owns: "[context-routing, skill-routing, executor-assignment, grill-cache-check, harness-optimization, product-dev-optimization]"
    consumes_artifacts: "[grill-cache-artifact, implementation-artifact, review-artifact, validation-artifact]"
    emits_artifacts: "[harness-optimization-artifact, product-development-optimization-artifact]"
    must_not: "[implement-features, bypass-review-agent, auto-edit-skills-rules-adrs, assign-executor-without-valid-grill-cache]"
  executor:
    phase: implementation
    tdd: red-green-refactor
    domain_skills: "[ui-ux, backend, data-platform, machine-learning]"
    emits_artifacts: "[implementation-artifact]"
    must_not: "[ship, validate, optimize-harness]"
  review:
    phase: review-and-testing
    sequence: "[review, validate, ship-ready]"
    consumes_workflow_cache: "[parent-cache-issue-{parentIssueId}, grill-cache-issue-{n}]"
    emits_artifacts: "[review-artifact, validation-artifact]"
    must_not: "[route-context, assign-executors, ship-before-validation, reload-full-skills-on-cache-hit]"
agent_structure:
  mode: single_executor
baseline_metrics:
  execution_time:
    unit: ms
    source: implementation-artifact.executionDurationMs
  token_usage:
    unit: tokens
    source: implementation-artifact.tokenUsage.total
  test_pass_rate:
    unit: ratio
    source: validation-artifact.testsPassed / validation-artifact.testsExecuted
  test_coverage:
    unit: percent
    source: validation-artifact.coveragePercentage
  review_failure_rate:
    unit: ratio
    source: review-artifact.reviewFailures / 1
  validation_failure_rate:
    unit: ratio
    source: validation-artifact.validationFailures / 1
  retry_count:
    unit: count
    source: validation-artifact.retryCount
  tool_invocation_count:
    unit: count
    source: implementation-artifact.toolInvocationCount
optimization:
  artifact_paths:
    implementation: agent-runtime/artifacts/implementations/implementation-issue-{n}.json
    review: agent-runtime/artifacts/reviews/review-issue-{n}.json
    validation: agent-runtime/artifacts/validation/validation-issue-{n}.json
    harness_output: agent-runtime/artifacts/optimization/harness-issue-{n}-{phaseRunId}.json
    product_dev_output: agent-runtime/artifacts/optimization/product-development-{id}.json
  editable_schema: agent-runtime/config/harness-editable.yml
  safelist: agent-runtime/config/harness-safelist.yml
  config_tool: agent-runtime/scripts/harness_config.py
  dry_run_default: true
  root_cause_categories:
    - context_underloaded
    - context_overloaded
    - wrong_executor_domain
    - insufficient_tdd_evidence
    - review_gap
    - validation_failure
    - tool_overuse
    - phase_loop
    - artifact_incomplete
    - architecture_unclear
  schemas_dir: agent-runtime/docs/schemas/
benchmark:
  enabled: true
  thresholds:
    execution_time_regression_ratio: 0.1
    token_usage_regression_ratio: 0.1
    failure_regression_count: 0
