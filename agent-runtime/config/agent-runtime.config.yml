version: 1
prompt:
  system_prompt: default
  verbosity: medium
  variants:
    default: Meta Agent routes context, assigns one executor domain, and optimizes only declarative harness configuration from runtime artifacts.
  additional_instructions:
    - Preserve product code, ADRs, PRDs, and architecture documents during harness optimization.
    - Prefer measurable changes to context budget, routing, skill loading, model choice, tools, and benchmark thresholds.
model:
  primary: claude-sonnet
  fallback: claude-haiku
  allowed:
    - claude-sonnet
    - claude-haiku
    - gpt-5
    - gpt-5-mini
context:
  budget_tokens: 50000
  max_files: 25
  retrieval_depth: 3
  reserved_reasoning_ratio: 0.1
routing:
  backend_threshold: 0.7
  ui_threshold: 0.6
  data_threshold: 0.7
  ml_threshold: 0.7
  # Prefer slice-routing.yml executorDomain when focusSlice / parentLinkage.sliceId is set.
  prefer_slice_executor_domain: true
  # Never dual-load backend + data-platform skills in harnessUtility.
  single_primary_domain_skill: true
  domain_mappings:
    backend:
      - backend/src/juli_backend/api
      - backend/src/juli_backend/core
      - backend/src/juli_backend/services
      - backend/src/juli_backend/workers
      - backend/src/juli_backend/integrations
      - infra/scripts
      - infra/systemd
    ui-ux:
      - apps/dashboard
      - apps/demo
      - packages/ui
      - packages/theme
      - packages/utils
      - packages/contracts
      - ios
    data-platform:
      - backend/src/juli_backend/database
      - backend/src/juli_backend/database/migrations
      - alembic/
    machine-learning:
      - backend/src/juli_backend/ai
  cross_layer_hints:
    backend:
      related_paths:
        - backend/src/juli_backend/api
        - backend/src/juli_backend/database
        - docs/architecture/map.md
      note: API and persistence context often required beyond backend/src/juli_backend/api
    ui-ux:
      related_paths:
        - apps/demo
        - packages/ui
        - packages/theme
        - docs/product/design/soul.md
        - docs/architecture/map.md
      note: Demo/UI library tasks use packages/* and design soul — not apps/dashboard product code
    data-platform:
      related_paths:
        - backend/src/juli_backend/database
        - backend/src/juli_backend/services/etl
        - backend/src/juli_backend/database/migrations
        - docs/architecture/data-sources.md
      note: Schema and ingestion paths span ordering and database layers
    machine-learning:
      related_paths:
        - backend/src/juli_backend/ai
        - backend/src/juli_backend/database
        - docs/api/data-models
      note: Feature pipelines depend on canonical data models outside ai/
  hints:
    - domain: machine-learning
      signal: synthetic_dataset_small
      action: require_golden_fixture_min_100
    - domain: ui-ux
      signal: external_api_call
      action: load_reliability_and_observability_rules
executors:
  enabled:
    - backend
    - ui-ux
    - data-platform
    - machine-learning
  default: backend
skills:
  backend:
    - backend
    - python-patterns
    - patterns
  ui-ux:
    - ui-ux
    - ui-ux-design
    - nextjs
  data-platform:
    - data-platform
    - postgres-patterns
  machine-learning:
    - machine-learning
tools:
  enabled:
    - ReadFile
    - rg
    - Glob
    - ApplyPatch
    - Shell
  disabled: []
  max_invocations_per_run: 80
agents:
  architect:
    phase: planning
    sequence: "[focus, grill-with-docs, to-prd, to-issues]"
    owns: "[prds, adrs, issues, architecture-docs, backlog, scope-alignment]"
    must_not: "[implement, route-executors, validate, ship]"
  meta:
    phase: "[implementation-routing, harness-optimization]"
    built_on: focus
    owns: "[context-routing, skill-routing, executor-assignment, harness-optimization, product-dev-optimization]"
    consumes_artifacts: "[implementation-artifact, review-artifact, validation-artifact]"
    emits_artifacts: "[harness-optimization-artifact, product-development-optimization-artifact]"
    must_not: "[implement-features, bypass-review-agent, auto-edit-skills-rules-adrs]"
    # Hard gate before Executor — no manual "prepare parent cache" prompt required.
    pre_executor_command: "python agent-runtime/scripts/meta_prepare_executor.py --issue {n}"
  executor:
    phase: implementation
    tdd: red-green-refactor
    domain_skills: "[ui-ux, backend, data-platform, machine-learning]"
    emits_artifacts: "[implementation-artifact]"
    must_not: "[ship, validate, optimize-harness, start-without-valid-workflow-cache]"
    # Unless artifact_gates.quickCommitSkip applies (.worktrees/debug + no issue-<N>).
    skip_artifacts_when: artifact_gates.quickCommitSkip
  review:
    phase: review-and-testing
    sequence: "[intent-review, guardrails, validate, ship-ready]"
    emits_artifacts: "[intent-review-artifact, review-artifact, validation-artifact]"
    must_not: "[route-context, assign-executors, ship-before-validation]"
    skip_artifacts_when: artifact_gates.quickCommitSkip
agent_structure:
  mode: single_executor
baseline_metrics:
  execution_time:
    unit: ms
    source: implementation-artifact.executionDurationMs
  token_usage:
    unit: tokens
    source: implementation-artifact.tokenUsage.total
  test_pass_rate:
    unit: ratio
    source: validation-artifact.testsPassed / validation-artifact.testsExecuted
  test_coverage:
    unit: percent
    source: validation-artifact.coveragePercentage
  review_failure_rate:
    unit: ratio
    source: review-artifact.reviewFailures / 1
  validation_failure_rate:
    unit: ratio
    source: validation-artifact.validationFailures / 1
  retry_count:
    unit: count
    source: validation-artifact.retryCount
  tool_invocation_count:
    unit: count
    source: implementation-artifact.toolInvocationCount
optimization:
  artifact_paths:
    implementation: agent-runtime/artifacts/implementations/implementation-issue-{n}.json
    review: agent-runtime/artifacts/reviews/review-issue-{n}.json
    validation: agent-runtime/artifacts/validation/validation-issue-{n}.json
    harness_output: agent-runtime/artifacts/optimization/harness-issue-{n}-{phaseRunId}.json
    product_dev_output: agent-runtime/artifacts/optimization/product-development-{id}.json
  editable_schema: agent-runtime/config/harness-editable.yml
  safelist: agent-runtime/config/harness-safelist.yml
  config_tool: agent-runtime/scripts/harness_config.py
  dry_run_default: true
  root_cause_categories:
    - context_underloaded
    - context_overloaded
    - wrong_executor_domain
    - insufficient_tdd_evidence
    - review_gap
    - validation_failure
    - tool_overuse
    - phase_loop
    - artifact_incomplete
    - architecture_unclear
  schemas_dir: agent-runtime/docs/schemas/
benchmark:
  enabled: true
  thresholds:
    execution_time_regression_ratio: 0.1
    token_usage_regression_ratio: 0.1
    failure_regression_count: 0
# ADR-003 issue artifacts vs quick GitHub commits (scratch/debug).
# Source of truth for agent behavior. CI mirror lives in .github/workflows/pr.yml
# (skips validate-artifacts when branch lacks issue-<N>). Do NOT teach agents to
# edit pr.yml or Tier-1 rules from .worktrees/debug — that slot resets to main;
# promote config changes via agent/runtime → PR like any harness change.
artifact_gates:
  issueBranchPattern: "issue-([0-9]+)"
  requireIssueArtifactsWhenBranchMatchesIssue: true
  quickCommitSkip:
    enabled: true
    worktreePathContains: ".worktrees/debug"
    branchNames:
      - scratch/debug
    # Both local signals above AND branch must lack issue-<N> (matches CI).
    requireBranchLacksIssueSuffix: true
    recommendedBranchPrefixes:
      - "fix/"
      - "chore/"
      - "docs/"
    skipEmit:
      - implementation-artifact
      - intent-review-artifact
      - review-artifact
      - validation-artifact
      - harness-optimization-artifact
    # Still expected on GitHub for non-issue PRs (pr.yml always-on jobs).
    ciStillRuns:
      - lint-and-typecheck
      - bandit
      - gitleaks
    # Simple YAML loader: one-line string only (no >- blocks).
    agentBehavior: "When cwd contains .worktrees/debug (or branch is scratch/debug) and the working branch name does not match issue-<N>: skip Meta workflow-cache gate, skip Executor/Review ADR-003 artifact emit, open a short PR, merge, reset scratch/debug to origin/main. Never use this path for issue-<N> work."
# Context load efficiency — layers from cheapest/reuse to heaviest.
# Prose SSOT: agent-runtime/docs/agent-runtime.md § Context hierarchy (efficiency).
# Injection prefix order for cache hits: workflow_prompt_cache.injectionOrder below.
context_hierarchy:
  layers:
    - id: L0_tier1_rules
      role: always_on
      note: core-safety, core-orchestration, mcp-usage, git-baseline
    - id: L1_workflow_cache
      role: planned_reusable
      note: parent-cache + issue-context-cache (local, gitignored); highest prefix reuse
    - id: L1b_harnessUtility
      role: routing_index
      note: skills / rulesTier2 / mcps / tools index inside child cache
    - id: L2_focus_context_plan
      role: session_filter
      note: Load / If Needed / DO NOT Load — do not ignore parentDoNotLoad
    - id: L3_skills_tier2_docs_code
      role: model_payload
      note: one primary domain skill; Tier-2 rules only when selected; docs from issueLoadProfile; code majority of window
    - id: L4_implementation_artifact
      role: observed_telemetry
      note: contextFilesLoaded, skillsLoaded, rulesLoaded, mcpsUsed, toolsUsed, tokenUsage — fill after run
    - id: L5_review_validation_harness
      role: gates_and_optimize
      note: ADR-003 CI artifacts + harness-optimization; not default session prompt filler
  antiPatterns:
    - load_all_tier2_rules
    - load_all_skills
    - inject_sibling_issue_caches
    - paste_prior_artifacts_into_next_turn
    - ignore_doNotLoad
workflow_prompt_cache:
  artifactsDir: agent-runtime/artifacts/workflow-cache
  # Meta must not assign Executor unless child cacheStatus == valid.
  requireValidCacheBeforeExecutor: true
  # meta_prepare_executor.py bootstraps missing parent/child caches automatically.
  ensureOnMetaEntry: true
  # Stable blocks first → volatile last (KV prefix reuse across Meta/Executor/Review ticks).
  injectionOrder:
    - parentScopeBlock
    - parentDoNotLoad
    - harnessUtility
    - issueLoadProfile
    - phaseCacheBlocks
    - promptCacheBlock
    - requiredModulesCodeAndModuleMd
  # Review/Validate skills stay out of Executor harnessUtility (phase-scoped).
  executorSkillsOnly:
    - domain/backend
    - domain/ui-ux
    - domain/data-platform
    - domain/machine-learning
    - standalone/ui-ux-design
  reviewSkillsDeferred:
    - standalone/intent-review
    - standalone/guardrails
    - standalone/validate
  bootstrap:
    pinBranch: HEAD
    sourcePaths:
      - .cursor/skills
      - agent-runtime/docs
  # Known epics — ensure_workflow_cache uses these when Parent/#slice missing from CLI.
  # parentScopeBlock uses \n escapes (simple YAML loader; no literal | blocks).
  epicRegistry:
    278:
      defaultSliceId: P2-A1
      handoffPath: docs/handoffs/phase-2-tiktok-implementation.md
      parentScopeBlock: "# Parent #278 — Phase 2 TikTok (constant)\\n## Epic deferrals\\n- T8 router / ML inference: Phase 4\\n- web/, ios/: out of P2 product scope unless slice says otherwise\\n## Merchants\\n- Fujiwa: read only\\n- SANDBOX_VN: write validation only\\n"
      doNotLoad:
        - docs/handoffs/archive/
        - docs/product/features/
        - web/
        - ios/
        - src/modules/ml/
        - Sibling issue context caches
    395:
      defaultSliceId: P2-6
      handoffPath: docs/product/phases/phase-2.6/PRD.md
      parentScopeBlock: "# Parent #395 — Phase 2.6 Demo frontend (constant)\\n## Product boundary\\n- apps/demo mock-only; four destinations; packages/ui + packages/theme\\n## Design authority\\n- ADR-023/024 + docs/product/design/ soul + ux_principles\\n"
      doNotLoad:
        - docs/handoffs/archive/
        - docs/product/features/
        - backend/
        - ios/
        - Sibling issue context caches
    419:
      defaultSliceId: P2-OPS-1
      handoffPath: docs/adr/027-database-migration-safety-pipeline.md
      parentScopeBlock: "# Parent #419 — Database migration safety pipeline (constant)\\n## Decision\\n- Extend safe-alembic gate; local-dev + restore drill; no Slack alerting\\n## Constraints\\n- ADR-020: VPS/SSH, no Docker for drills; backups never leave VPS\\n"
      doNotLoad:
        - docs/handoffs/archive/
        - docs/product/features/
        - web/
        - ios/
        - apps/demo/
        - docs/product/design/
        - docs/integrations/tiktok_api/
        - Sibling issue context caches
    462:
      defaultSliceId: P2-9-1
      handoffPath: docs/product/phases/phase-2.9/PRD.md
      # Per-child Focus slices — CI meta_prepare has no --slice-id; issue bodies may omit Slice.
      childSlices:
        "463": P2-9-1
        "464": P2-9-2
        "465": P2-9-3
        "466": P2-9-4
        "467": P2-9-5
        "468": P2-9-6
        "469": P2-9-7
      parentScopeBlock: "# Parent #462 — Phase 2.9 Analytics historical backfill (constant)\\n## Product boundary\\n- Idempotent resumable Partner Analytics → shared analytics_performance_intervals (Fujiwa first)\\n- Soft-cap ~350–400 Partner calls/run; hard stop before 500; partition by (shop_id, bucket, date)\\n- Persist GMV (TikTok) never Net Revenue; Ads out; no Demo/Dashboard UI\\n## Schema law\\n- Shared schema only (ADR-029); additive nullable columns OK; no parallel mart\\n## Slices (wave 1 — merged)\\n- P2-9-1 schema columns · P2-9-2 partition progress · P2-9-3 call-budget governor\\n## Slices (wave 2 — bucket partition E2E)\\n- P2-9-4 revenue (#466) · P2-9-5 product (#467) · P2-9-6 LIVE (#468) · P2-9-7 catalog (#469)\\n## Epic deferrals\\n- Orchestrator (#470), coverage (#471), HITL (#472)\\n- Pricing-model export/fit; Product Impressions/Views; A-33 fan-out\\n"
      doNotLoad:
        - docs/handoffs/archive/
        - docs/product/features/
        - apps/demo/
        - apps/landing/
        - web/
        - ios/
        - docs/product/design/
        - Sibling issue context caches
