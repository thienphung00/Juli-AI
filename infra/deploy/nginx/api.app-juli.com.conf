# App Review backend — api.app-juli.com (Phase 2.5)
#
# Serves the FastAPI app (src.apps.api_gateway.api.main:app) via the juli-api
# systemd service on the single review VPS. Review-only surface exposing health,
# reviewer auth, and the TikTok OAuth callback. HTTPS via certbot.
#
# Reviewer-relevant routes:
#   GET  /health                        -> liveness probe (2xx JSON)
#   POST /v1/auth/otp/send              -> reviewer login (Supabase OTP)
#   POST /v1/auth/otp/verify           -> reviewer login (Supabase OTP)
#   *    /v1/auth/tiktok/callback       -> TikTok OAuth callback (route lands in #259)

upstream juli_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.app-juli.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://api.app-juli.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.app-juli.com;

    ssl_certificate     /etc/letsencrypt/live/api.app-juli.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.app-juli.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Health probe used by the smoke test and reviewers.
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # TikTok OAuth callback path (route implemented in issue #259).
    location = /v1/auth/tiktok/callback {
        proxy_pass http://127.0.0.1:8000/v1/auth/tiktok/callback;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
