# App Review frontend — app-juli.com (Phase 2.5)
#
# Serves the Next.js app (apps/dashboard/) via the juli-web systemd service on the
# single review VPS. HTTPS certificates are issued/renewed by certbot.
# This is a review-only surface: no production traffic, no HA tuning.

upstream juli_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name app-juli.com www.app-juli.com;

    # Allow ACME HTTP-01 challenges, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://app-juli.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app-juli.com;

    ssl_certificate     /etc/letsencrypt/live/app-juli.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app-juli.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
