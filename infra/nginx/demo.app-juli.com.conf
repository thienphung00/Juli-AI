# Demo frontend — demo.app-juli.com (Phase 2.6, Issue #406)
#
# Serves apps/demo via the juli-demo systemd service on the review VPS.
# Independent upstream from app-juli.com (3000) and api.app-juli.com (8000).
# HTTPS certificates are issued/renewed by certbot.

upstream juli_demo {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name demo.app-juli.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://demo.app-juli.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name demo.app-juli.com;

    ssl_certificate     /etc/letsencrypt/live/demo.app-juli.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.app-juli.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
