name: PR Validation

on:
  pull_request:
    branches: [main, staging]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  resolve-issue:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.issue.outputs.number }}
    steps:
      - name: Resolve issue number from branch
        id: issue
        run: |
          branch="${{ github.head_ref }}"
          if [[ "$branch" =~ issue-([0-9]+) ]]; then
            echo "number=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "number=" >> "$GITHUB_OUTPUT"
          fi

  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff mypy types-requests
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy backend/ --ignore-missing-imports --disable-error-code=valid-type

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Pytest
        run: pytest tests/ -v --tb=short

  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: migration_test
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/migration_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt psycopg2-binary
      - name: Alembic upgrade head
        run: alembic upgrade head
      - name: Alembic downgrade one
        run: alembic downgrade -1
      - name: Alembic re-upgrade head
        run: alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and test
        run: |
          npm ci
          npm run lint
          npm run type-check
          npm run test

  validate-artifacts:
    runs-on: ubuntu-latest
    needs: resolve-issue
    if: needs.resolve-issue.outputs.issue_number != ''
    env:
      ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
      GITHUB_BASE_REF: ${{ github.base_ref }}
      GITHUB_HEAD_REF: ${{ github.head_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run validate gates
        run: |
          issue="${ISSUE_NUMBER}"
          failed=0
          for script in scripts/validate/check_*.py; do
            echo "==> $script"
            python "$script" --issue "$issue" || failed=1
          done
          echo "==> scripts/ci/normalize_review_artifacts.py --check"
          python scripts/ci/normalize_review_artifacts.py --issue "$issue" --check || failed=1
          exit "$failed"

  generate-validation-artifact:
    runs-on: ubuntu-latest
    needs: [resolve-issue, validate-artifacts]
    if: needs.resolve-issue.outputs.issue_number != ''
    env:
      ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
      GITHUB_BASE_REF: ${{ github.base_ref }}
      GITHUB_HEAD_REF: ${{ github.head_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate validation artifact
        run: python scripts/ci/generate_validation_artifact.py --issue "${{ needs.resolve-issue.outputs.issue_number }}"
      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-issue-${{ needs.resolve-issue.outputs.issue_number }}
          path: artifacts/validation/validation-issue-${{ needs.resolve-issue.outputs.issue_number }}.json

  status-check:
    runs-on: ubuntu-latest
    needs:
      - resolve-issue
      - lint-and-typecheck
      - test
      - migration-check
      - frontend
      - validate-artifacts
      - generate-validation-artifact
    if: always()
    steps:
      - name: Require all jobs
        run: |
          lint="${{ needs.lint-and-typecheck.result }}"
          test="${{ needs.test.result }}"
          mig="${{ needs.migration-check.result }}"
          fe="${{ needs.frontend.result }}"
          val="${{ needs.validate-artifacts.result }}"
          gen="${{ needs.generate-validation-artifact.result }}"
          issue='${{ needs.resolve-issue.outputs.issue_number }}'

          fail() { echo "$1"; exit 1; }

          [[ "$lint" == "success" ]] || fail "lint-and-typecheck: $lint"
          [[ "$test" == "success" ]] || fail "test: $test"
          [[ "$mig" == "success" ]] || fail "migration-check: $mig"
          [[ "$fe" == "success" ]] || fail "frontend: $fe"

          if [[ -n "$issue" ]]; then
            [[ "$val" == "success" ]] || fail "validate-artifacts: $val"
            [[ "$gen" == "success" ]] || fail "generate-validation-artifact: $gen"
          else
            echo "Skipping artifact gates (branch name has no issue-N suffix)"
          fi
          echo "All required checks passed."
