name: PR Validation

on:
  pull_request:
    branches: [main, staging]

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  resolve-issue:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.issue.outputs.number }}
    steps:
      - name: Resolve issue number from branch
        id: issue
        run: |
          branch="${{ github.head_ref }}"
          if [[ "$branch" =~ issue-([0-9]+) ]]; then
            echo "number=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "number=" >> "$GITHUB_OUTPUT"
          fi

  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./backend[dev]"
      - name: Ruff
        run: ruff check backend/src/juli_backend tests scripts
      - name: Mypy
        run: mypy backend/src/juli_backend --ignore-missing-imports --disable-error-code=valid-type

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Bandit (fail on medium+ severity)
        run: bandit -r backend/src/juli_backend -ll

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
      TIKTOK_APP_KEY: ${{ secrets.TIKTOK_APP_KEY }}
      TIKTOK_APP_SECRET: ${{ secrets.TIKTOK_APP_SECRET }}
      TIKTOK_SANDBOX_AUTH_CODE: ${{ secrets.TIKTOK_SANDBOX_AUTH_CODE }}
      TIKTOK_SANDBOX_REFRESH_TOKEN: ${{ secrets.TIKTOK_SANDBOX_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e "./backend[dev]"
      - name: Install PostgreSQL client 16
        run: sudo apt-get update && sudo apt-get install -y postgresql-client-16
      - name: Pytest with coverage
        # Floor set 5 points below the measured juli_backend baseline (85%, 2026-07-09)
        # so this gate lands as a regression guard, not an immediate blocker.
        # Re-baseline (docs/deployment/troubleshooting.md) as coverage improves.
        run: pytest tests/ -v --tb=short --cov=juli_backend --cov-report=term-missing --cov-fail-under=80

  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: migration_test
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/migration_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e "./backend[dev]"
      - name: Alembic upgrade head
        run: alembic upgrade head
      - name: Alembic downgrade one
        run: alembic downgrade -1
      - name: Alembic re-upgrade head
        run: alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    # Build-time env matches infra/scripts/env/web.env.example (App Review deploy) —
    # NEXT_PUBLIC_* values are baked into the bundle at build time.
    env:
      NEXT_PUBLIC_API_URL: https://api.app-juli.com
      NEXT_PUBLIC_UI_ONLY: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install and test
        run: |
          npm ci
          npm run lint
          npm run type-check
          npm run test
      - name: Production build
        run: npm run build

  demo-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Demo dependency graph
        run: pnpm install --frozen-lockfile --filter @juli/demo...
      - name: Check Demo independently
        run: pnpm check:demo

  demo-deploy-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python test dependencies
        run: pip install -e "./backend[dev]"
      - name: Demo deploy contract tests (#406)
        run: |
          python -m pytest tests/unit/test_phase_2_6_demo_deploy_config.py \
            tests/unit/test_phase_2_6_demo_deploy.py -q

  validate-artifacts:
    runs-on: ubuntu-latest
    needs: resolve-issue
    if: needs.resolve-issue.outputs.issue_number != ''
    env:
      ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
      GITHUB_BASE_REF: ${{ github.base_ref }}
      GITHUB_HEAD_REF: ${{ github.head_ref }}
      # Required for meta_prepare_executor / fingerprint gates (gh issue view).
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run validate gates
        run: |
          issue="${ISSUE_NUMBER}"
          failed=0
          # Workflow caches are gitignored (machine-local). Bootstrap before gates
          # so check_workflow_cache_* / issue_load_profile can run in CI.
          echo "==> agent-runtime/scripts/meta_prepare_executor.py --issue $issue"
          python agent-runtime/scripts/meta_prepare_executor.py --issue "$issue" || failed=1
          for script in agent-runtime/scripts/validate/check_*.py; do
            echo "==> $script"
            python "$script" --issue "$issue" || failed=1
          done
          echo "==> agent-runtime/scripts/ci/normalize_review_artifacts.py --check"
          python agent-runtime/scripts/ci/normalize_review_artifacts.py --issue "$issue" --check || failed=1
          exit "$failed"

  generate-validation-artifact:
    runs-on: ubuntu-latest
    needs: [resolve-issue, validate-artifacts]
    if: needs.resolve-issue.outputs.issue_number != ''
    env:
      ISSUE_NUMBER: ${{ needs.resolve-issue.outputs.issue_number }}
      GITHUB_BASE_REF: ${{ github.base_ref }}
      GITHUB_HEAD_REF: ${{ github.head_ref }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Generate validation artifact
        run: python agent-runtime/scripts/ci/generate_validation_artifact.py --issue "${{ needs.resolve-issue.outputs.issue_number }}"
      - name: Upload validation artifact
        uses: actions/upload-artifact@v7
        with:
          name: validation-issue-${{ needs.resolve-issue.outputs.issue_number }}
          path: agent-runtime/artifacts/validation/validation-issue-${{ needs.resolve-issue.outputs.issue_number }}.json

  status-check:
    runs-on: ubuntu-latest
    needs:
      - resolve-issue
      - lint-and-typecheck
      - bandit
      - gitleaks
      - test
      - migration-check
      - frontend
      - demo-frontend
      - demo-deploy-contracts
      - validate-artifacts
      - generate-validation-artifact
    if: always()
    steps:
      - name: Require all jobs
        run: |
          lint="${{ needs.lint-and-typecheck.result }}"
          bandit="${{ needs.bandit.result }}"
          gitleaks="${{ needs.gitleaks.result }}"
          test="${{ needs.test.result }}"
          mig="${{ needs.migration-check.result }}"
          fe="${{ needs.frontend.result }}"
          demo="${{ needs.demo-frontend.result }}"
          demo_deploy="${{ needs.demo-deploy-contracts.result }}"
          val="${{ needs.validate-artifacts.result }}"
          gen="${{ needs.generate-validation-artifact.result }}"
          issue='${{ needs.resolve-issue.outputs.issue_number }}'

          fail() { echo "$1"; exit 1; }

          [[ "$lint" == "success" ]] || fail "lint-and-typecheck: $lint"
          [[ "$bandit" == "success" ]] || fail "bandit: $bandit"
          [[ "$gitleaks" == "success" ]] || fail "gitleaks: $gitleaks"
          [[ "$test" == "success" ]] || fail "test: $test"
          [[ "$mig" == "success" ]] || fail "migration-check: $mig"
          [[ "$fe" == "success" ]] || fail "frontend: $fe"
          [[ "$demo" == "success" ]] || fail "demo-frontend: $demo"
          [[ "$demo_deploy" == "success" ]] || fail "demo-deploy-contracts: $demo_deploy"

          if [[ -n "$issue" ]]; then
            [[ "$val" == "success" ]] || fail "validate-artifacts: $val"
            [[ "$gen" == "success" ]] || fail "generate-validation-artifact: $gen"
          else
            echo "Skipping artifact gates (branch name has no issue-N suffix)"
          fi
          echo "All required checks passed."
