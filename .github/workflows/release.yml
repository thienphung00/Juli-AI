name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and verify
        run: |
          pip install -e "./backend[dev]"
          ruff check backend/src/juli_backend tests scripts
          mypy backend/src/juli_backend --ignore-missing-imports --disable-error-code=valid-type
          pytest tests/ -q

  # Deploys to the single review VPS via SSH — no Railway/Vercel/containers.
  # Skipped on tag pushes (tags cut a GitHub Release from what's already live;
  # only a push to main triggers a new deploy). See infra/scripts/deploy-release.sh
  # for the release-worktree/symlink/health-check mechanics run on the VPS.
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          # Pulls the canonical checkout up to this SHA first so deploy-release.sh
          # itself is always the version being deployed, then hands off to it —
          # see infra/scripts/deploy-release.sh for the worktree/health-check flow.
          script: |
            set -euo pipefail
            cd ~/Juli-AI-v2
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            ./infra/scripts/deploy-release.sh "${{ github.sha }}"

  generate-release-artifact:
    runs-on: ubuntu-latest
    needs: deploy
    # Runs when deploy succeeded (push to main) or was skipped (tag push cutting
    # a release from what's already live) — but not when deploy actually failed.
    if: always() && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="0.0.0+${GITHUB_SHA::7}"
          fi
          echo "value=$ver" >> "$GITHUB_OUTPUT"
      - name: Generate release artifact
        run: |
          python agent-runtime/scripts/ci/generate_release_artifact.py \
            --version "${{ steps.version.outputs.value }}" \
            --commit "${{ github.sha }}" \
            --branch main \
            --environment production
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.value }}
          path: artifacts/releases/release-${{ steps.version.outputs.value }}.json

  github-release:
    runs-on: ubuntu-latest
    needs: [generate-release-artifact]
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/releases/release-*.json
