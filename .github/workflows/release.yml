name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and verify
        run: |
          pip install -r requirements.txt ruff mypy types-requests
          ruff check .
          mypy src/ --ignore-missing-imports --disable-error-code=valid-type
          pytest tests/ -q

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway (staging)
        run: echo "Configure RAILWAY_TOKEN secret to enable staging deploy"
        # railway up --environment staging
        # env:
        #   RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  smoke-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Smoke test staging
        run: echo "Add curl health check against staging URL when deployed"

  deploy-production:
    runs-on: ubuntu-latest
    needs: smoke-staging
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway (production)
        run: echo "Configure RAILWAY_TOKEN secret to enable production deploy"

  generate-release-artifact:
    runs-on: ubuntu-latest
    needs: deploy-production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="0.0.0+${GITHUB_SHA::7}"
          fi
          echo "value=$ver" >> "$GITHUB_OUTPUT"
      - name: Generate release artifact
        run: |
          python scripts/ci/generate_release_artifact.py \
            --version "${{ steps.version.outputs.value }}" \
            --commit "${{ github.sha }}" \
            --branch main \
            --environment production
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.value }}
          path: artifacts/releases/release-${{ steps.version.outputs.value }}.json

  github-release:
    runs-on: ubuntu-latest
    needs: [generate-release-artifact]
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/releases/release-*.json
